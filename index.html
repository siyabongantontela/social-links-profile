<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>Social Links Profile</title>
</head>

<body class="font-display bg-(--my-grey-900) flex justify-center items-center h-lvh">
    <main
        class="flex flex-col justify-center items-center bg-(--my-grey-800) w-96 py-10 px-11 rounded-2xl text-sm  text-(--my-white)">
        <img src="./social-links-profile-main/assets/images/avatar-jessica.jpeg" alt="A headshot of Jessica Randall"
            class="w-28 rounded-full mb-6">
        <h1 class="text-2xl font-semibold mb-2">Jessica Randall</h1>
        <p class="text-(--my-green) mb-6">London, United Kingdom</p>
        <blockquote class="font-normal mb-4">"Front-end developer and avid reader"</blockquote>
        <button
            class="bg-(--my-grey-700) font-bold w-full mb-4 py-2 rounded-lg hover:bg-(--my-green) hover:text-(--my-grey-900) hover:cursor-pointer"><a
                href="#">GitHub</a></button>
        <button
            class="bg-(--my-grey-700) font-bold w-full mb-4 py-2 rounded-lg  hover:bg-(--my-green) hover:text-(--my-grey-900) hover:cursor-pointer"><a
                href="#">Frontend Mentor</a> </button>
        <button
            class="bg-(--my-grey-700) font-bold w-full mb-4 py-2 rounded-lg  hover:bg-(--my-green) hover:text-(--my-grey-900) hover:cursor-pointer"><a
                href="#">LinkedIn</a></button>
        <button
            class="bg-(--my-grey-700) font-bold w-full mb-4 py-2 rounded-lg  hover:bg-(--my-green) hover:text-(--my-grey-900) hover:cursor-pointer"><a
                href="#">Twitter</a></button>
        <button
            class="bg-(--my-grey-700) font-bold w-full py-2 rounded-lg  hover:bg-(--my-green) hover:text-(--my-grey-900) hover:cursor-pointer"><a
                href="#">Instagram</a></button>
    </main>
</body>

</html>
